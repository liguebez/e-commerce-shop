upstream clothin_app {
    server web:8000;
}

server {
    listen 80;
    server_name 3-34-160-167.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name 3-34-160-167.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/3-34-160-167.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3-34-160-167.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;   # admin product-image uploads

    # main.Product.image uploads (upload_to='products/%Y/%m/%d/'). Django
    # and WhiteNoise only serve MEDIA_URL when DEBUG=True (see
    # clothin/clothin/urls.py); in production nothing else serves
    # /media/, so nginx must, directly from the volume shared with web.
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # Everything else, including /static/, is proxied to gunicorn.
    # WhiteNoise (whitenoise.middleware.WhiteNoiseMiddleware, already
    # active in settings.py) serves /static/ from inside the app process
    # using the collectstatic-generated hashed manifest, with its own
    # compression and far-future cache headers. There is deliberately no
    # shared static volume here -- mounting one would shadow the
    # build-time-collected files with an empty volume on first mount.
    location / {
        proxy_pass http://clothin_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # required by SECURE_PROXY_SSL_HEADER
        proxy_read_timeout 60s;
    }
}
