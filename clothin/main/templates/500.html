<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 - Server Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        h1 { font-size: 6rem; font-weight: 700; line-height: 1; }
        h2 { font-size: 1.5rem; font-weight: 500; }
        p { color: #666; max-width: 400px; }
        a {
            margin-top: 8px;
            padding: 12px 32px;
            background-color: rgba(0, 0, 0, 0.229);
            border-radius: 5px;
            text-decoration: none;
            color: inherit;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        a:hover { background-color: rgba(0, 0, 0, 0.395); color: #efeded; }
    </style>
</head>
<body>
    <div class="error-wrap">
        <h1>500</h1>
        <h2>Something Went Wrong</h2>
        <p>We are working on it. Please try again in a moment.</p>
        <a href="/">Back to Homepage</a>
    </div>
</body>
</html>
