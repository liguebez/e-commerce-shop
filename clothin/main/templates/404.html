{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; gap:16px;">
    <h1 style="font-size:6rem; font-weight:700; margin:0; line-height:1;">404</h1>
    <h2 style="font-size:1.5rem; font-weight:500; margin:0;">Page Not Found</h2>
    <p style="color:#666; max-width:400px; margin:0;">The page you are looking for does not exist or has been moved.</p>
    <a href="{% url 'main:index' %}" class="btn" style="margin-top:8px; padding:12px 32px; text-decoration:none;">Back to Homepage</a>
</div>
{% endblock %}
